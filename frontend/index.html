<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CypherVault | Initialize Sequence</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/glassmorphism.css"> 
</head>
<body class="landing-body">

    <div class="bg-glow"></div>

    <div id="redirect-overlay" class="redirect-overlay">
        <div class="redirect-content">
            <div class="spinner"></div>
            <h2 id="redirect-text" style="font-family: var(--font-mono); color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green);"></h2>
        </div>
    </div>

    <div class="decorative-corner corner-top-left"></div>
    <div class="decorative-corner corner-top-right"></div>
    <div class="decorative-corner corner-bottom-left"></div>
    <div class="decorative-corner corner-bottom-right"></div>

    <aside class="side-terminal left-terminal fade-in-up delay-2">
        <p class="data-stream">[ SECURE_KERNEL_INIT ] ... OK</p>
        <p class="data-stream">[ AUTH_MODULE_v1.9 ] ... OK</p>
    </aside>
    <aside class="side-terminal right-terminal fade-in-up delay-2">
        <p class="data-stream">[ NODES: 7 / 7 ] ... OK</p>
        <p class="data-stream">[ LATENCY: 4.1ms ] ... OK</p>
    </aside>

    <header class="landing-header fade-in-up">
        <div style="display: flex; gap: 20px;">
            <span style="color: var(--accent-green); font-family: var(--font-mono);">v2.6</span>
            <span style="color: var(--text-muted); font-family: var(--font-mono);">GLOBAL NODES: 7 ACTIVE</span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="status-indicator active"></span>
            <span class="system-secure-text">SYSTEM SECURE</span>
        </div>
    </header>

    <main class="initialize-module">
        <div class="split-layout">
            
            <div class="hero-box fade-in-up delay-1">
                <div class="scanner-line"></div>
                <img src="public/assets/images/logo.svg" alt="CypherVault Logo" class="logo-pulse" style="width: 90px; height: 90px; margin-bottom: 20px;">
                <h1 style="margin: 0; font-size: 3rem; color: var(--accent-green); font-family: var(--font-mono); letter-spacing: 2px; text-shadow: 0 0 15px rgba(159, 239, 0, 0.4);">CypherVault</h1>
                <div style="height: 30px; margin-top: 10px; margin-bottom: 40px; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.9rem;">
                    > <span id="typewriter-text"></span><span class="cursor"></span>
                </div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn-cyber active-glow" onclick="window.location.href='src/pages/dashboard/dashboard.html'">INITIALIZE DASHBOARD</button>
                    <button class="btn-cyber" style="opacity: 0.7;" onclick="window.location.href='src/pages/about/about.html'">SYSTEM INFO</button>
                </div>
            </div>

            <div class="terminal-box fade-in-up delay-2" onclick="document.getElementById('term-input').focus()">
                <div class="terminal-header">
                    <div class="window-controls">
                        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                    </div>
                    <div class="terminal-title">root@cyphervault-core:~</div>
                </div>
                
                <div class="terminal-body" id="terminal-output">
                    <div class="terminal-input" id="input-line" style="display: none;">
                        <span class="prompt">root@cypher:~# </span>
                        <input type="text" id="term-input" autocomplete="off" spellcheck="false" autofocus>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="landing-footer fade-in-up delay-3" style="font-family: var(--font-mono); color: var(--text-muted);">
        <div>V 2.6.0.44 | NODE_ID: alpha-7 | SECURE LINK</div>
        <div style="opacity: 0.5;">&copy; 2026 CypherVault Systems.</div>
    </footer>

    <script src="src/js/components/typewriter.js"></script>
    <script src="src/js/components/terminal.js"></script>
</body>
</html>
